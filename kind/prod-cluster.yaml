# =============================================================================
#  kind cluster config — Production Environment
#  Creates a local Kubernetes cluster called "coffee-prod" inside Docker
#  Command: kind create cluster --config kind/prod-cluster.yaml
# =============================================================================

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

# Cluster name — kubectl context will be "kind-coffee-prod"
name: coffee-prod

nodes:
  # Single control-plane node (acts as worker too for a sample project)
  - role: control-plane
    # Map host port 80 to node port 80 so nginx Ingress is reachable at localhost
    extraPortMappings:
      - containerPort: 80
        hostPort: 8082        # Prod accessible at http://localhost:8082
        protocol: TCP
      - containerPort: 443
        hostPort: 8445
        protocol: TCP
