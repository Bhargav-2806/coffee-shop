# Ingress for QA — routes external traffic into the cluster via nginx
# Prerequisite: kubectl apply -f https://kind.sigs.k8s.io/examples/ingress/deploy-ingress-nginx.yaml
# Access at: http://localhost:8081 (mapped via kind extraPortMappings)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: coffee-shop
  namespace: coffee-qa
  labels:
    app: coffee-shop
    env: qa
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: coffee-shop
                port:
                  number: 80
