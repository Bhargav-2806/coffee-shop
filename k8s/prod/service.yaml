# ClusterIP Service for Production — internal only, exposed externally via Ingress
apiVersion: v1
kind: Service
metadata:
  name: coffee-shop
  namespace: coffee-prod
  labels:
    app: coffee-shop
    env: prod
spec:
  type: ClusterIP
  selector:
    app: coffee-shop
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
