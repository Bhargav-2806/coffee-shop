# Deployment for Production — applied to kind-coffee-prod cluster
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coffee-shop
  namespace: coffee-prod
  labels:
    app: coffee-shop
    env: prod
spec:
  # 1 replica — sample project
  replicas: 1
  selector:
    matchLabels:
      app: coffee-shop
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  template:
    metadata:
      labels:
        app: coffee-shop
        env: prod
    spec:

      # ── Pod-level security ───────────────────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      automountServiceAccountToken: false

      containers:
        - name: coffee-shop
          # CI pipeline updates this tag after every successful build on main branch
          image: bhargav2806/coffee-shop:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8080

          envFrom:
            - configMapRef:
                name: coffee-shop-config

          # ── Container-level security ─────────────────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          # ── Resource limits ──────────────────────────────────────────────────
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          # ── Liveness Probe ───────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5

          # ── Readiness Probe ──────────────────────────────────────────────────
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}
