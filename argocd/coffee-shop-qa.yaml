# ArgoCD Application — QA environment (kind-coffee-qa cluster)
# Auto-sync: CI pushes a new image tag to values-qa.yaml → ArgoCD detects and deploys automatically
# NOTE: Update repoURL with your GitHub repo once Phase 2 (GitHub setup) is complete
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: coffee-shop-qa
  namespace: argocd
  labels:
    app: coffee-shop
    env: qa
spec:
  project: default

  source:
    repoURL: https://github.com/YOUR_GITHUB_USERNAME/coffee-shop.git
    targetRevision: main
    path: helm/coffee-shop
    helm:
      valueFiles:
        - values-qa.yaml

  destination:
    server: https://kubernetes.default.svc   # in-cluster (ArgoCD installed on kind-coffee-qa)
    namespace: coffee-qa

  syncPolicy:
    automated:
      prune: true       # Remove resources deleted from Git
      selfHeal: true    # Revert manual kubectl changes back to Git state
    syncOptions:
      - CreateNamespace=false   # Namespace is managed by the Helm chart
