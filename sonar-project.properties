# SonarQube project configuration
# Token and host URL are passed via environment variables — never hardcode secrets here

sonar.projectKey=coffee-shop
sonar.projectName=The London Brew - Coffee Shop
sonar.projectVersion=1.0.0

# Source directories to analyse
sonar.sources=src,server

# Test directories
sonar.tests=src/__tests__,server/__tests__

# Files to exclude from analysis
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.config.ts,**/*.config.js

# Coverage report path — generated by vitest --coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclude test files from coverage calculation
sonar.coverage.exclusions=**/__tests__/**,**/test-setup.ts

sonar.sourceEncoding=UTF-8
