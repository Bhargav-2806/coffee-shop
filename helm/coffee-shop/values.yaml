# Default values — overridden by values-qa.yaml or values-prod.yaml

replicaCount: 1

image:
  repository: bhargav2806/coffee-shop
  tag: latest
  pullPolicy: Always

# Environment identity — overridden per environment
namespace: coffee-qa
env: qa

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /

app:
  nodeEnv: "production"
  port: "8080"

resources:
  requests:
    cpu: "100m"
    memory: "64Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

# Pod-level security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

# Container-level security context
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

probes:
  liveness:
    path: /health
    port: 8080
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 5
  readiness:
    path: /health
    port: 8080
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 3
    timeoutSeconds: 3

rollingUpdate:
  maxUnavailable: 0
  maxSurge: 1
