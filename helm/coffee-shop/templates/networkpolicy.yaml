# Zero Trust network — deny all by default, then allow only what's needed

# Block all ingress and egress by default
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "coffee-shop.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---

# Allow traffic in from nginx ingress controller only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-controller
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "coffee-shop.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: {{ include "coffee-shop.name" . }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort }}

---

# Allow DNS egress — required for hostname resolution
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "coffee-shop.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: {{ include "coffee-shop.name" . }}
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
