# ClusterIP Service — internal only, exposed externally via Ingress
apiVersion: v1
kind: Service
metadata:
  name: {{ include "coffee-shop.name" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "coffee-shop.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ include "coffee-shop.name" . }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
