# QA environment overrides
# Used by: kind-coffee-qa (local) and coffee-shop-qa EKS cluster
# CI pipeline auto-updates image.tag on every successful push to main

namespace: coffee-qa
env: qa

image:
  tag: 7dcf499b528913710c2ce144d4904f58aca56b67

# On EKS: LoadBalancer provisions an AWS Classic ELB with a public DNS name
# On kind: switch back to ClusterIP + nginx ingress (localhost:8081)
service:
  type: LoadBalancer
  port: 80
  targetPort: 8080
